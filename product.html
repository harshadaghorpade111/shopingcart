<!DOCTYPE html>
<html>
<head>
<title>Product Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🛍 Tech Store</h1>
<a href="cart.html" class="cart-btn">🛒 View Cart</a>
</header>

<div class="products">

<div class="product-card">
<img src="./download.jpeg">
<h3>Laptop</h3>
<p class="price">₹50000</p>
<button onclick="addToCart('Laptop',50000)">Add to Cart</button>
</div>

<div class="product-card">
<img src="./download (1).jpeg">
<h3>Mobile</h3>
<p class="price">₹20000</p>
<button onclick="addToCart('Mobile',20000)">Add to Cart</button>
</div>

<div class="product-card">
<img src="./download (2).jpeg">
<h3>Headphones</h3>
<p class="price">₹3000</p>
<button onclick="addToCart('Headphones',3000)">Add to Cart</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
